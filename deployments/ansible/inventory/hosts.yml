---
all:
  vars:
    afterdark_version: "0.1.0"
    afterdark_config_dir: "/etc/afterdark"
    afterdark_data_dir: "/var/lib/afterdark"
    afterdark_log_dir: "/var/log/afterdark"
    darkapi_key: "{{ lookup('env', 'DARKAPI_API_KEY') }}"

  children:
    linux:
      children:
        debian:
          hosts:
            # debian1.example.com:
        ubuntu:
          hosts:
            # ubuntu1.example.com:
        rhel:
          hosts:
            # rhel1.example.com:
        rocky:
          hosts:
            # rocky1.example.com:

    macos:
      vars:
        afterdark_config_dir: "/etc/afterdark"
        afterdark_data_dir: "/var/lib/afterdark"
        ansible_become_method: sudo
      hosts:
        # mac1.example.com:

    windows:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
        afterdark_config_dir: "C:\\ProgramData\\AfterDark"
        afterdark_install_dir: "C:\\Program Files\\AfterDark"
      hosts:
        # win1.example.com:
        #   ansible_user: Administrator
        #   ansible_password: "{{ vault_windows_password }}"
